name: material_query_app
description: Material query app with Bluetooth support for iOS and Android.
publish_to: 'none'

version: 4.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.35.3
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.3
  http: ^1.4.0
  excel: ^4.0.6
dev_dependencies:
  flutter_launcher_icons: "^0.14.1" 
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/SSME.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.jpg
  remove_alpha_ios: true